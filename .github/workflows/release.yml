name: Release

# Build the Windows + macOS distributables and publish a DRAFT GitHub release.
#
# Triggered manually (workflow_dispatch with a version input) or by pushing a v*
# tag. Builds run on clean GitHub runners (windows-latest / macos-latest) — the
# Windows runner has no Smart App Control, so electron-builder's makensis isn't
# blocked (local builds on a SAC-enforced machine fail with `spawn UNKNOWN`).
#
# Builds are UNSIGNED (no signing cert). The release stays a draft so the
# artifacts can be smoke-tested before publishing.
#
# Distribution (Windows):
#  - The NSIS INSTALLER (.exe) ships as a bare .exe for a one-click download.
#    A directly-downloaded .exe carries a Mark-of-the-Web, so SmartScreen warns
#    once at install ("More info" -> "Run anyway"); the app it installs is
#    written fresh (no MotW) and launches cleanly thereafter.
#  - The PORTABLE build ships INSIDE a .zip: it IS the app exe and runs directly
#    every time, so a bare download's MotW would trip SmartScreen on each launch.
#    Extracting from a once-unblocked .zip avoids that.
# The macOS .dmg ships as-is.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to release, e.g. v1.0.0 (created at the current commit if it does not exist)'
        required: true

permissions:
  contents: write

jobs:
  # Mandatory secret-scan gate: nothing builds or publishes unless this passes.
  secret-scan:
    uses: ./.github/workflows/secret-scan.yml
    secrets: inherit

  build:
    needs: secret-scan
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build distributables (unsigned)
        run: npm run dist
        env:
          # No signing certificate available — build unsigned, don't probe the
          # keychain (would hang/fail on the macOS runner).
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Windows: ship the NSIS installer as a bare .exe (one-click download);
      # zip the portable build so a direct download's Mark-of-the-Web doesn't
      # trip SmartScreen on every launch. Portable artifacts carry "portable"
      # in the file name (see electron-builder.yml); everything else is the
      # installer.
      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-out | Out-Null
          Get-ChildItem release\*.exe | ForEach-Object {
            if ($_.Name -like '*portable*') {
              $zip = Join-Path 'dist-out' ($_.BaseName + '.zip')
              Compress-Archive -Path $_.FullName -DestinationPath $zip -Force
              Write-Host "zipped $($_.Name) -> $zip"
            } else {
              Copy-Item $_.FullName -Destination 'dist-out'
              Write-Host "copied $($_.Name) (direct installer .exe)"
            }
          }
          Get-ChildItem dist-out

      # macOS: the .dmg ships as-is (Gatekeeper is handled at first launch).
      - name: Collect macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist-out
          find release -maxdepth 1 -type f \
            \( -name '*.dmg' -o -name '*.zip' \) \
            -exec cp {} dist-out/ \;
          ls -la dist-out

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist-out/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          echo "Releasing $TAG"
          # Re-runnable: drop a pre-existing release for this tag (keep the tag).
          gh release delete "$TAG" --yes 2>/dev/null || true
          # Compose the release body: an auto-generated "What's Changed"
          # changelog (PRs merged since the previous release) followed by the
          # static install / warning guide.
          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="$TAG" --jq .body > changelog.md || : > changelog.md
          # Drop the release-bump PR line(s) — they just record the version
          # tick and add noise to the changelog.
          grep -vE '^\* chore\(release\): bump version' changelog.md > changelog.tmp || true
          mv changelog.tmp changelog.md
          {
            cat changelog.md
            echo
            echo "---"
            echo
            cat dist-assets/release-notes.md
          } > release-body.md
          gh release create "$TAG" \
            artifacts/* \
            --target "${{ github.sha }}" \
            --title "fc-downloader $TAG" \
            --draft \
            --notes-file release-body.md
