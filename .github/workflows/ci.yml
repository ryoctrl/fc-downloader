name: CI

# Typecheck, lint, test, and build on every push to main and every PR.
# Runs on Linux (electron-vite build only — no packaging — so no Wine/Electron
# runtime is needed).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Block secrets / real credentials from entering the codebase. Scans the
  # working tree (not git history) so a NEW secret fails the PR, while the
  # existing history (kept as-is; nothing there is a live secret) doesn't
  # perpetually fail. The release workflow runs the same gate before building.
  secret-scan:
    uses: ./.github/workflows/secret-scan.yml
    secrets: inherit

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
