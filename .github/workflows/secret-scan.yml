name: Secret scan

# Reusable secret-scanning gate, called by both CI (every PR/push) and the
# release workflow (before any build). Scans the WORKING TREE (`--no-git`), not
# git history: a new secret in the code fails the run, but the existing history
# — which holds no live credential — doesn't perpetually fail the pipeline.
#
# gitleaks runs always (free, no account). ggshield (GitGuardian) runs too when
# the GITGUARDIAN_API_KEY repo secret is set, making the GitGuardian check a
# hard, mandatory gate before release.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: gitleaks (working tree)
        run: |
          VER=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          chmod +x gitleaks
          ./gitleaks detect --no-git --source . --redact --no-banner

      - name: GitGuardian (ggshield) — mandatory when GITGUARDIAN_API_KEY is set
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          if [ -z "$GITGUARDIAN_API_KEY" ]; then
            echo "::warning::GITGUARDIAN_API_KEY is not set — ggshield skipped. Add the repo secret (Settings → Secrets and variables → Actions) to enforce the GitGuardian gate before release."
            exit 0
          fi
          pip install --quiet ggshield
          ggshield secret scan path . --recursive --yes
