# electron-builder packaging config.
# Build with: npm run dist  (runs typecheck + electron-vite build, then packages)
# Output goes to ./release/ (gitignored).
appId: app.fcdownloader
productName: fc-downloader

directories:
  output: release
  buildResources: build

# electron-vite emits the app into out/; package only that + manifest.
files:
  - out/**
  - package.json

# No native modules (the metadata store is pure JS), so default asar packing is fine.

win:
  icon: build/icon.ico
  target:
    - nsis # Setup installer
    - portable # single self-contained .exe (no install needed — handy for testing)
  artifactName: ${productName}-${version}-${arch}.${ext}

mac:
  icon: build/icon.icns
  category: public.app-category.utilities
  target:
    # Universal binary (x64 + arm64) so one .dmg runs on Intel and Apple Silicon.
    - target: dmg
      arch: universal
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

portable:
  artifactName: ${productName}-${version}-portable.${ext}

# NOTE: builds are unsigned.
#  - Windows: SmartScreen warns on first run ("More info" -> "Run anyway"); Smart
#    App Control (if enforced) blocks them (turn it off or sign).
#  - macOS: Gatekeeper blocks unsigned apps. After copying to /Applications run
#    `xattr -dr com.apple.quarantine "/Applications/fc-downloader.app"` (Apple
#    Silicon may also need `codesign --force --deep -s - <app>`).
# Code signing is a future task (see docs/spec/security-and-legal.md).
